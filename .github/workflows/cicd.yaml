name: CI-CD Pipeline

on:
  push:
    branches: [main]

jobs:

  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        python -m spacy download en_core_web_sm

    - name: Run tests
      run: |
        pytest

  docker-build-push:
    needs: build-and-test
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Login to DockerHub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build image
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/ats-ai .

    - name: Push image
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/ats-ai